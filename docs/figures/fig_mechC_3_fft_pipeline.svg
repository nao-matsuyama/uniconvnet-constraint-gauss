<svg xmlns="http://www.w3.org/2000/svg" width="680" height="510" viewBox="0 0 680 510" role="img">
<title>spectral枝の計算パイプライン</title>
<desc>rfft2 で周波数化し、低周波帯を切り出し、rank-K で構築した多ガウス混合包絡を乗算し、ゼロ埋めして irfft2 で空間に戻す流れ</desc>
<style>
text{font-family:'Segoe UI','Hiragino Sans','Yu Gothic','Noto Sans JP',Meiryo,sans-serif}
.t{font-size:14px;font-weight:400;fill:#2C2C2A}
.ts{font-size:12px;font-weight:400;fill:#5F5E5A}
.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-coral rect{fill:#FAECE7;stroke:#D85A30}
.c-coral .th{fill:#712B13}
.c-coral .ts{fill:#993C1D}
.box{fill:#FFFFFF;stroke:#B4B2A9}
.arr{stroke:#5F5E5A;fill:none;stroke-width:1.5}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="510" fill="#FFFFFF"/>
<g class="c-coral"><rect x="40" y="16" width="14" height="14" rx="3" stroke-width="0.5"/></g><text class="ts" x="62" y="23" dominant-baseline="central">機構Cの効率化ポイント(他は標準演算)</text>
<rect class="box" x="160" y="44" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="300" y="62" text-anchor="middle" dominant-baseline="central">rfft2 で周波数へ</text><text class="ts" x="300" y="82" text-anchor="middle" dominant-baseline="central">(B, C, H, Wf) 複素スペクトル</text>
<line x1="300" y1="100" x2="300" y2="136" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><rect x="160" y="140" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="300" y="158" text-anchor="middle" dominant-baseline="central">低周波帯だけ切り出し</text><text class="ts" x="300" y="178" text-anchor="middle" dominant-baseline="central">η = α/σ_ref(振幅考慮)</text></g>
<line x1="300" y1="196" x2="300" y2="232" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><rect x="160" y="236" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="300" y="254" text-anchor="middle" dominant-baseline="central">混合包絡 Ŵ を一括乗算</text><text class="ts" x="300" y="274" text-anchor="middle" dominant-baseline="central">複素乗算はK本でも1回</text></g>
<g class="c-coral"><rect x="460" y="236" width="180" height="56" rx="8" stroke-width="0.5"/><text class="th" x="550" y="254" text-anchor="middle" dominant-baseline="central">rank-K 分離構築</text><text class="ts" x="550" y="274" text-anchor="middle" dominant-baseline="central">exp は K·C·(H′+W′) 回</text></g>
<line x1="458" y1="264" x2="446" y2="264" class="arr" marker-end="url(#arrow)"/>
<line x1="300" y1="292" x2="300" y2="328" class="arr" marker-end="url(#arrow)"/>
<rect class="box" x="160" y="332" width="280" height="56" rx="8" stroke-width="0.5"/><text class="th" x="300" y="350" text-anchor="middle" dominant-baseline="central">フルサイズへゼロ埋め</text><text class="ts" x="300" y="370" text-anchor="middle" dominant-baseline="central">切り捨てた高周波 = 0</text>
<line x1="300" y1="388" x2="300" y2="424" class="arr" marker-end="url(#arrow)"/>
<rect class="box" x="160" y="428" width="280" height="44" rx="8" stroke-width="0.5"/><text class="th" x="300" y="450" text-anchor="middle" dominant-baseline="central">irfft2 で空間へ戻す (B, C, H, W)</text>
</svg>
